services:
  products.database:
     image: mcr.microsoft.com/mssql/server:2022-latest
     container_name: products.database
     environment:
        SA_PASSWORD: "SqlDocker123"
        ACCEPT_EULA: "Y"
     ports:
       - "1435:1435"
     volumes:
       - sqlserver_volume:/var/opt/mssql 
     healthcheck:
        test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S products.database -U sa -P SqlDocker123 -Q 'SELECT 1' -b -o /dev/null"]
        interval: 10s
        retries: 10
        start_period: 10s
        timeout: 5s
  products.database.configurator:
     image: mcr.microsoft.com/mssql/server:2022-latest
     volumes:
       - ./Longbeach.Infrastructure/InitDb:/init-db
     depends_on:
       products.database:
         condition: service_healthy
     command: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -C -S products.database -U sa -P SqlDocker123 -i /init-db/init.sql"
  longbeach.api:
     image: ${DOCKER_REGISTRY-}longbeachapi
     container_name: products.api
     build:
        context: .
        dockerfile: Longbeach-Customer/Dockerfile
     ports:
       - "5000:5000"
       - "5001:5001"
     depends_on:
       - products.database
     environment:
       - ConnectionStrings__SqlServerConnection=Server=products.database;Database=CustomerDB;User Id=sa;Password=SqlDocker123;TrustServerCertificate=true;Encrypt=False;
  produdts.cache:
     image: redis:latest
     container_name: products.cache
     restart: always
     ports:
       - "6378:6378"

  
    

volumes:
    sqlserver_volume: {}